
name: Fedora 42, R 4.6
on:
  workflow_dispatch:
  schedule:
    - cron:  '23 07 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    container: ghcr.io/r-lib/rig/fedora-42-devel:latest
    steps:
    - name: Check Distro and R version
      run: |
        #
        readRenviron("/etc/os-release")
        if (Sys.getenv("ID") != "fedora") stop("Not Fedora")
        if (Sys.getenv("VERSION_ID") != "42") stop("Not Fedora 42")
        if (getRversion() < "4.6.0" || getRversion() >= "4.7.0") {
          stop("Not R 4.6.x")
        }
      shell: Rscript {0}
    - uses: actions/checkout@v3
    - uses: r-hub/repos/actions/update-repo@main
      with:
        directory: fedora-42/4.6
        token: ${{ secrets.CRANATGH_GITHUB_TOKEN }}
