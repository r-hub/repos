
name: Fedora 44, R 4.7
on:
  workflow_dispatch:
  schedule:
    - cron:  '23 07 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    container: ghcr.io/r-hub/containers/gcc16:latest
    steps:
    - name: Check Distro and R version
      run: |
        #
        readRenviron("/etc/os-release")
        if (Sys.getenv("ID") != "fedora") stop("Not Fedora")
        if (Sys.getenv("VERSION_ID") != "44") stop("Not Fedora 44")
        if (getRversion() < "4.7.0" || getRversion() >= "4.8.0") {
          stop("Not R 4.7.x")
        }
      shell: Rscript {0}
    - uses: actions/checkout@v3
    - uses: r-hub/repos/actions/update-repo@main
      with:
        directory: fedora-44/4.7
        token: ${{ secrets.CRANATGH_GITHUB_TOKEN }}
